<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<title>Deadwater Gulch: Boomtown</title>
<style>
  html,body{margin:0;height:100%;background:#0d0b08;overflow:hidden;font-family:Georgia,serif}
  #cv{width:100%;height:100%;display:block;touch-action:none}
  .ui{position:fixed;z-index:10;color:#e8dcc0}
  #hud{left:10px;top:8px;font:13px monospace;background:rgba(20,14,8,.72);padding:8px 10px;border-radius:6px;line-height:1.5}
  #goldbar{width:150px;height:9px;background:#241a10;border:1px solid #6b4a2e;border-radius:4px;overflow:hidden}
  #goldfill{height:100%;background:linear-gradient(90deg,#e8c447,#b8862a);width:100%}
  #modal{left:0;top:0;right:0;bottom:0;display:none;background:rgba(8,6,4,.78);align-items:center;justify-content:center;padding:14px}
  .card{max-width:560px;width:100%;max-height:86vh;overflow:auto;background:#e8dcc0;color:#241a10;border:2px solid #6b4a2e;border-radius:4px;padding:18px 20px;box-shadow:0 12px 40px rgba(0,0,0,.6)}
  .card h1{font-size:21px;margin:0 0 4px;border-bottom:2px solid #241a10;padding-bottom:6px;letter-spacing:.5px}
  .card h2{font-size:16px;margin:12px 0 4px}
  .card .body{font-size:14px;line-height:1.55;margin:8px 0 12px}
  .card button{display:block;width:100%;text-align:left;font:14px Georgia,serif;margin:7px 0;padding:11px 13px;background:#2b2016;color:#e8dcc0;border:1px solid #6b4a2e;border-radius:4px;touch-action:manipulation}
  .card button:active{background:#6b4a2e}
  .mast{font-size:11px;letter-spacing:2px;text-align:center;color:#6b4a2e}
  .headline{font-weight:bold;margin:6px 0 2px}
  .small{font-size:12px;color:#4a3826}
  #endweek{right:10px;bottom:12px;font:15px Georgia,serif;padding:12px 18px;background:#6b4a2e;color:#e8dcc0;border:1px solid #241a10;border-radius:6px}
</style>
</head>
<body>
<canvas id="cv"></canvas>
<div id="hud" class="ui"></div>
<button id="endweek" class="ui">End Week ▸</button>
<div id="modal" class="ui"></div>
<script type="module" src="/src/main.ts"></script>
</body>
</html>
