  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;

      right: 10px;
      background: rgba(0,0,0,0.7);
      padding: 8px 12px;

      font-family: monospace;
      font-size: 12px;
      max-width: 200px;

  <canvas id="canvas"></canvas>
  <div id="qa"></div>
  <script type="module" src="/src/main.ts"></script>
